<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container {
    padding:20px;
}

.header {
    font-size:28px;
    margin-bottom:20px;
}

.cards {
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    flex:1;
    text-align:center;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
}

.chart-box {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">❤️ Heart Disease Dashboard</div>

<div class="cards">
    <div class="card">
        <h3>Risk Probability</h3>
        <h2>{{ prob }}%</h2>
    </div>

    <div class="card">
        <h3>Prediction</h3>
        <h2>{{ result }}</h2>
    </div>

    <div class="card">
        <h3>BP</h3>
        <h2>{{ ap_hi }}/{{ ap_lo }}</h2>
    </div>

    <div class="card">
        <h3>Age</h3>
        <h2>{{ age }}</h2>
    </div>
</div>

<div class="grid">

<div class="chart-box">
    <h3>Feature Importance</h3>
    <canvas id="featureChart"></canvas>
</div>

<div class="chart-box">
    <h3>Risk Curve</h3>
    <canvas id="riskChart"></canvas>
</div>

</div>

</div>

<script>
new Chart(document.getElementById("featureChart"), {
    type: 'bar',
    data: {
        labels: ["Age","BP","Cholesterol","BMI"],
        datasets: [{
            label: "Importance",
            data: [10, 25, 15, 8]
        }]
    }
});

new Chart(document.getElementById("riskChart"), {
    type: 'line',
    data: {
        labels: ["Low","Medium","High"],
        datasets: [{
            label: "Risk",
            data: [20, 50, 90]
        }]
    }
});
</script>

</body>
</html>
